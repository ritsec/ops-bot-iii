name: Linode Deploy

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Pull and build on Linode
        uses: appleboy/ssh-action@v0.18
        with:
          host: ${{ secrets.LINODE_HOST }}
          username: ${{ secrets.LINODE_USER }}
          password: ${{ secrets.LINODE_PASSWORD }}
          script: |
            set -e
            cd /root/ops-bot-iii
            git pull origin main
            go mod download
            make 
            chmod +x OBIII
            ./install.sh

                
  